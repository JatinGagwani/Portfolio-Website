<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>🫪</title>

  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html,
    body {
      width: 100%;
      height: 100%;
      background: transparent;
    }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    img {
      width: min(70vw, 360px);
      height: auto;
      display: block;
      user-select: none;
      pointer-events: none;
    }
  </style>
</head>

<body>
  <img src="distorted-face-emoji-transparent.png" alt="Distorted face emoji" />
</body>
</html>
