<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Landing Page Coming Soon...</title>
  <meta name="description" content="Something is cooking. For now, enjoy this catty." />

  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html,
    body {
      width: 100%;
      min-height: 100%;
      font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: radial-gradient(circle at top, #1b1b1b 0%, #050505 65%);
      color: #ffffff;
    }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      overflow-x: hidden;
    }

    .page {
      width: 100%;
      max-width: 720px;
      text-align: center;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 18px;
      padding: 8px 14px;
      border: 1px solid rgba(255, 255, 255, 0.18);
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.06);
      backdrop-filter: blur(10px);
      font-size: 14px;
      color: rgba(255, 255, 255, 0.78);
    }

    h1 {
      margin-bottom: 14px;
      font-size: clamp(36px, 9vw, 82px);
      line-height: 0.95;
      letter-spacing: -0.06em;
      font-weight: 900;
    }

    p {
      max-width: 520px;
      margin: 0 auto 28px;
      font-size: clamp(16px, 4vw, 22px);
      line-height: 1.5;
      color: rgba(255, 255, 255, 0.72);
    }

    .gif-card {
      width: min(100%, 420px);
      margin: 0 auto;
      padding: 14px;
      border-radius: 28px;
      background: rgba(255, 255, 255, 0.08);
      border: 1px solid rgba(255, 255, 255, 0.14);
      box-shadow: 0 30px 90px rgba(0, 0, 0, 0.45);
    }

    .tenor-gif-embed {
      border-radius: 20px;
      overflow: hidden;
      transform: translateZ(0);
    }

    .footer {
      margin-top: 26px;
      font-size: 13px;
      color: rgba(255, 255, 255, 0.42);
    }

    @media (max-width: 480px) {
      body {
        padding: 18px;
      }

      .gif-card {
        padding: 10px;
        border-radius: 22px;
      }

      .tenor-gif-embed {
        border-radius: 16px;
      }
    }
  </style>
</head>

<body>
  <main class="page">
    <div class="badge">Website loading...</div>

    <h1>Something is cooking.</h1>

    <p>
      The real landing page is coming soon. Until then, please enjoy this very serious business catty.
    </p>

    <div class="gif-card">
      <div
        class="tenor-gif-embed"
        data-postid="5034219186050115128"
        data-share-method="host"
        data-aspect-ratio="0.993976"
        data-width="100%"
      >
        <a href="https://tenor.com/view/cat-scuba-dance-gif-5034219186050115128">
          Cat Scuba Dance GIF
        </a>
        from
        <a href="https://tenor.com/search/cat-gifs">
          Cat GIFs
        </a>
      </div>
    </div>

    <div class="footer">
      Built with GitHub Pages. Powered by questionable cat energy.
    </div>
  </main>

  <script async src="https://tenor.com/embed.js"></script>
</body>
</html>
